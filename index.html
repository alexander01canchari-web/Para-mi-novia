<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9ecf,#ffd6eb);
    font-family:Arial;
    overflow:hidden;
}

.sobre{
    position:relative;
    width:320px;
    height:200px;
    background:#ff4da6;
    border-radius:10px;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.tapa{
    position:absolute;
    width:100%;
    height:100%;
    background:#ff1a8c;
    clip-path:polygon(0 0, 100% 0, 50% 60%);
    transform-origin:top;
    transition:1s;
}

.corazon{
    position:absolute;
    top:70px;
    left:50%;
    transform:translateX(-50%);
    font-size:40px;
    animation:latido 1s infinite;
}

@keyframes latido{
    0%{transform:translateX(-50%) scale(1);}
    50%{transform:translateX(-50%) scale(1.2);}
    100%{transform:translateX(-50%) scale(1);}
}

.caja{
    display:none;
    background:white;
    padding:30px;
    border-radius:20px;
    width:320px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input{
    margin-top:15px;
    padding:10px;
    width:90%;
    border-radius:15px;
    border:1px solid #ccc;
    text-align:center;
}

button{
    margin-top:20px;
    padding:10px 25px;
    border:none;
    border-radius:25px;
    background:#ff4da6;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="sobre" onclick="abrirSobre()" id="sobre">
    <div class="tapa" id="tapa"></div>
    <div class="corazon">💖</div>
</div>

<div class="caja" id="cuestionario">
    <h2 id="pregunta">¿Quién es el amor de tu vida? 💕</h2>
    <input type="text" id="respuesta">
    <button onclick="siguiente()">Responder</button>
</div>

<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mp3">
</audio>

<script>
function abrirSobre(){
    document.getElementById("tapa").style.transform="rotateX(180deg)";
    let musica = document.getElementById("musica");
    musica.play();

    setTimeout(()=>{
        document.getElementById("sobre").style.display="none";
        document.getElementById("cuestionario").style.display="block";
    },1000);
}

let paso = 0;

let preguntas = [
"¿Quién es el amor de tu vida? 💖",
"¿Cuándo es nuestra fecha de aniversario? 😌",
"¿Me amas mucho? ❤️"
];

let respuestasCorrectas = [
"luis",
"28",
"si"
];

function siguiente(){
let input = document.getElementById("respuesta").value.toLowerCase();

if(!input.includes(respuestasCorrectas[paso])){
    alert("Intenta otra vez mi amor 😏💗");
    return;
}

paso++;

if(paso < preguntas.length){
    document.getElementById("pregunta").innerText = preguntas[paso];
    document.getElementById("respuesta").value="";
}else{
    let musica = document.getElementById("musica");
    localStorage.setItem("tiempoMusica", musica.currentTime);
    window.location.href="amor.html";
}
}
</script>

</body>
</html>
